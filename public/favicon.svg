<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181c" />
      <stop offset="100%" stop-color="#0e0e11" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base background card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#primaryGrad)" stroke-width="4" stroke-opacity="0.4" />

  <g filter="url(#glow)">
    <!-- Central Glowing Symbol: Heart + Pulse Waves -->
    <path d="M256 424c-12 0-216-136-216-248 0-66 52-120 118-120 42 0 81 22 103 57 22-35 61-57 103-57 66 0 118 54 118 120 0 112-204 248-216 248z" 
          fill="none" 
          stroke="url(#primaryGrad)" 
          stroke-width="28" 
          stroke-linejoin="round" 
          stroke-linecap="round" />
    
    <!-- Pulse Line across Heart -->
    <path d="M120 256h70l30-60 40 120 35-80 25 20h72" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Sparkle dot top right -->
    <circle cx="390" cy="120" r="14" fill="#06b6d4" />
    <path d="M390 95v50M365 120h50" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>